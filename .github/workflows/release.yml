name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.target == 'aarch64-apple-darwin' && 'macos-latest' || matrix.target == 'x86_64-apple-darwin' && 'macos-latest' || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Build
        run: |
          RUSTFLAGS="-C lto=fat -C codegen-units=1 -C strip=symbols" \
            cargo build --release --target ${{ matrix.target }} -p hdl-graph-cli

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/hdl-graph dist/
          cd dist && tar czf hdl-graph-${{ matrix.target }}.tar.gz hdl-graph
          echo "SHA256: $(shasum -a 256 hdl-graph-${{ matrix.target }}.tar.gz)"

      - uses: softprops/action-gh-release@v1
        with:
          files: dist/hdl-graph-${{ matrix.target }}.tar.gz
